<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>net·console — network terminal</title>
  <meta name="description" content="network terminal — handles both SSH and Telnet." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script>
    (function () {
      var t = localStorage.getItem('rcfg.theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <div class="bg-grad"></div>
  <div class="bg-grid"></div>

  <header class="header">
    <div class="container header-inner">
      <div class="brand">
        <h1>net<span class="accent">·</span>console</h1>
      </div>
      <div class="header-right">
        <button id="theme-toggle" class="btn btn-ghost btn-sm theme-toggle" title="dark/light" aria-label="toggle theme">
          <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun"  width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </button>
        <div class="backend-box">
          <span id="backend-dot" class="dot dot-idle" title="stato backend"></span>
          <input id="backend-url" type="text" placeholder="http://localhost:8000" />
          <button id="backend-test" class="btn btn-ghost btn-sm">test</button>
          <button id="backend-save" class="btn btn-sm">salva</button>
        </div>
      </div>
    </div>
  </header>

  <main class="container main-grid">
    <section class="col-main">
      <div class="card">
        <div class="grid-2">
          <div class="field">
            <label>Nome (opzionale)</label>
            <input id="f-name" type="text" placeholder="Switch core sala server" />
          </div>
          <div class="field">
            <label>Tipo dispositivo</label>
            <select id="f-device">
              <option value="generic">generic</option>
              <option value="cisco">cisco (SB / SF300)</option>
              <option value="cisco_ios">cisco_ios</option>
              <option value="mikrotik">mikrotik</option>
            </select>
          </div>
        </div>

        <div class="grid-host">
          <div class="field">
            <label>Host</label>
            <input id="f-host" type="text" placeholder="192.168.1.10" />
          </div>
          <div class="field">
            <label>Porta</label>
            <input id="f-port" type="number" value="22" />
          </div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label>User</label>
            <input id="f-user" type="text" placeholder="admin" autocomplete="off" />
          </div>
          <div class="field">
            <label>Password</label>
            <div class="pwd-wrap">
              <input id="f-password" type="password" autocomplete="new-password" />
              <button type="button" id="pwd-toggle" class="pwd-toggle" title="mostra/nascondi">show</button>
            </div>
          </div>
        </div>

        <div class="field">
          <label>Comandi (uno per riga)</label>
          <textarea id="f-commands" rows="6" placeholder="show version&#10;show running-config" class="terminal-input"></textarea>
        </div>

        <div class="row-actions">
          <div class="switches">
            <label class="switch toggle">
              <input id="f-nohostkey" type="checkbox" checked />
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
              <span class="toggle-label">disabilita host key check</span>
            </label>
            <label class="switch toggle">
              <input id="f-savepwd" type="checkbox" />
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
              <span class="toggle-label">salva password</span>
            </label>
          </div>
          <div class="actions">
            <button id="btn-save-device" class="btn btn-outline">save device</button>
            <button id="btn-save-script" class="btn btn-outline">save script</button>
            <button id="btn-run" class="btn btn-primary">run</button>
          </div>
        </div>
      </div>

      <div id="terminal" class="terminal">
        <div class="terminal-empty">— nessun output — esegui un comando per iniziare</div>
      </div>
    </section>

    <aside class="col-side">
      <div class="card tabs">
        <div class="tab-buttons">
          <button class="tab-btn active" data-tab="devices">Rubrica</button>
          <button class="tab-btn" data-tab="scripts">Script</button>
          <button class="tab-btn" data-tab="history">Storico</button>
        </div>

        <div class="tab-panel active" data-panel="devices">
          <div id="list-devices" class="list"></div>
        </div>
        <div class="tab-panel" data-panel="scripts">
          <div id="list-scripts" class="list"></div>
        </div>
        <div class="tab-panel" data-panel="history">
          <div class="panel-actions">
            <button id="btn-clear-history" class="btn btn-ghost btn-sm">svuota</button>
          </div>
          <div id="list-history" class="list"></div>
        </div>
      </div>
    </aside>
  </main>

  <footer class="container footer">
    Backend: <code>cd backend &amp;&amp; uvicorn server:app --host 0.0.0.0 --port 8000</code>
  </footer>

  <div id="toast-container" class="toast-container"></div>

  <script>
    (function () {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;
      btn.addEventListener('click', function () {
        var cur = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
        var next = cur === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('rcfg.theme', next);
      });
    })();
  </script>
  <script src="app.js"></script>
</body>
</html>
